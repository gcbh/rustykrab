name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Gate job: add this as a required status check in branch protection
  # to block merges when any CI job fails.
  ci-pass:
    name: CI Pass
    if: always()
    needs: [check, test, fmt, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.fmt.result }}" != "success" ||
                "${{ needs.audit.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            echo "  check:  ${{ needs.check.result }}"
            echo "  test:   ${{ needs.test.result }}"
            echo "  fmt:    ${{ needs.fmt.result }}"
            echo "  audit:  ${{ needs.audit.result }}"
            exit 1
          fi
