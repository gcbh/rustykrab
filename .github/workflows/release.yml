name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Version bump, commit, tag ──────────────────────────────────────
  bump:
    name: Bump Version & Tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from PR labels
        id: bump-type
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"semver:major"'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"semver:minor"'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        run: |
          ./scripts/release.sh "${{ steps.bump-type.outputs.bump }}" \
            --ci \
            --pr-title "${{ github.event.pull_request.title }}" \
            --pr-number "${{ github.event.pull_request.number }}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: |
          git push origin main --tags

  # ── Build release binaries ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustykrab-cli
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: rustykrab-cli
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: rustykrab-cli

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rustykrab-cli

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf rustykrab-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: rustykrab-${{ matrix.target }}
          path: dist/rustykrab-${{ matrix.target }}.tar.gz

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" \
            CHANGELOG.md > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          body_path: release_notes.md
          files: artifacts/*
          generate_release_notes: false
