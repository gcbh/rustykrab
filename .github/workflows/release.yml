name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Version bump, commit, tag ──────────────────────────────────────
  bump:
    name: Bump Version & Tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"semver:major"'; then
              echo "bump=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '"semver:minor"'; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump version
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '0' }}
          BUMP_TYPE: ${{ steps.bump-type.outputs.bump }}
        run: |
          ./scripts/release.sh "$BUMP_TYPE" \
            --ci \
            --pr-title "$PR_TITLE" \
            --pr-number "$PR_NUMBER"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin main --tags

  # ── Build release binaries ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Built with cargo-zigbuild targeting glibc 2.35 so the artifact
          # runs on Ubuntu 22.04 and any newer glibc-based distro. We can
          # no longer build on the ubuntu-22.04 runner directly because
          # the Rust stable toolchain's precompiled std references glibc
          # 2.39 symbols (even the per-crate build scripts fail to run on
          # 22.04). zig-as-linker rewrites the glibc version refs in the
          # final binary back down to 2.35.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustykrab-cli
            glibc: "2.35"
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: rustykrab-cli
            glibc: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      # The macos-14 runner image ships a `cargo` shim that dispatches to
      # `rustup-init` (the installer), so `cargo build` is rejected as an
      # unknown installer argument. Reinstall rustup with the stable
      # toolchain and build target in one shot via the official script,
      # then prepend $HOME/.cargo/bin to PATH so subsequent steps pick up
      # the real cargo proxy. Skip dtolnay/rust-toolchain here — running
      # it after the bootstrap can re-shadow the proxies we just put in
      # place.
      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y \
                --default-toolchain stable \
                --profile minimal \
                --target ${{ matrix.target }} \
                --no-modify-path
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/cargo" --version
          "$HOME/.cargo/bin/rustc" --version

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os != 'macOS'
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install zig
        if: matrix.glibc != ''
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.glibc != ''
        run: cargo install --locked cargo-zigbuild

      - name: Build release binary
        run: |
          if [ -n "${{ matrix.glibc }}" ]; then
            cargo zigbuild --release \
              --target "${{ matrix.target }}.${{ matrix.glibc }}" \
              -p rustykrab-cli
          else
            cargo build --release --target ${{ matrix.target }} -p rustykrab-cli
          fi

      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 900 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm /tmp/cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Codesign and bundle
        if: runner.os == 'macOS'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          VERSION=${{ needs.bump.outputs.version }}
          APP=target/${{ matrix.target }}/release/RustyKrab.app

          # Detect signing identity
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TEAM_ID=$(echo "$IDENTITY" | sed -n 's/.*(\([A-Z0-9]*\)).*/\1/p')

          # Create .app bundle with embedded provisioning profile
          mkdir -p "$APP/Contents/MacOS"
          cp "$BINARY" "$APP/Contents/MacOS/${{ matrix.artifact }}"

          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$APP/Contents/embedded.provisionprofile"

          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.gcbh.rustykrab</string>
              <key>CFBundleExecutable</key>
              <string>${{ matrix.artifact }}</string>
              <key>CFBundleName</key>
              <string>RustyKrab</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
          </dict>
          </plist>
          PLIST

          # Sign the bundle
          codesign \
              --sign "$IDENTITY" \
              --options runtime \
              --team-id "$TEAM_ID" \
              --identifier "com.gcbh.rustykrab" \
              --entitlements entitlements.plist \
              -r="designated => anchor apple generic and certificate leaf[subject.OU] = \"${TEAM_ID}\"" \
              --force \
              "$APP"

          codesign -vvv "$APP"

      - name: Package artifact
        run: |
          mkdir -p dist
          if [ -d "target/${{ matrix.target }}/release/RustyKrab.app" ]; then
            cp -R target/${{ matrix.target }}/release/RustyKrab.app dist/
            cd dist
            tar czf rustykrab-${{ matrix.target }}.tar.gz RustyKrab.app
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
            cd dist
            tar czf rustykrab-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rustykrab-${{ matrix.target }}
          path: dist/rustykrab-${{ matrix.target }}.tar.gz

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" \
            CHANGELOG.md > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          body_path: release_notes.md
          files: artifacts/*
          generate_release_notes: false
