name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Version bump, commit, tag ──────────────────────────────────────
  bump:
    name: Bump Version & Tag
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"semver:major"'; then
              echo "bump=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '"semver:minor"'; then
              echo "bump=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Bump version
        id: bump
        env:
          PR_TITLE: ${{ github.event.pull_request.title || 'Manual release' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '0' }}
          BUMP_TYPE: ${{ steps.bump-type.outputs.bump }}
        run: |
          ./scripts/release.sh "$BUMP_TYPE" \
            --ci \
            --pr-title "$PR_TITLE" \
            --pr-number "$PR_NUMBER"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin main --tags

  # ── Build release binaries ─────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustykrab-cli
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: rustykrab-cli

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p rustykrab-cli

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist
          tar czf rustykrab-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: rustykrab-${{ matrix.target }}
          path: dist/rustykrab-${{ matrix.target }}.tar.gz

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.bump.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" \
            CHANGELOG.md > release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          body_path: release_notes.md
          files: artifacts/*
          generate_release_notes: false
